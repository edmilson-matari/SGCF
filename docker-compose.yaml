services:
  front:
    build: ./frontend
    container_name: front
    env_file:
      - ./frontend/.env.docker
    ports:
      - "5173:5173"
    depends_on:
      - db
      - back
    networks:
      - backend-net
  db:
    image: postgres:18-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=formation_center
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"] # Verifica se o PG aceita conexões
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
  back:
    build: ./backend
    container_name: back
    env_file:
      - ./backend/.env.docker
    ports:
      - "3000:3000"
    networks:
      - backend-net
    depends_on:
      db:
        condition: service_healthy # Espera o banco ficar 'healthy'
volumes:
  postgres-data:
networks:
  backend-net:
